name: Release to PyPI

# Publishes to PyPI on a version tag (e.g. v0.4.0), using PyPI Trusted
# Publishing (OIDC) — no API tokens stored in the repo.
#
# One-time setup on PyPI: create the `pcb-dfm` project's Trusted Publisher for
# this repo + workflow (pypi.org → project → Publishing → add a GitHub
# publisher: owner mfgs-us, repo pcb-dfm, workflow release.yml, environment
# pypi). Then push a tag `vX.Y.Z` matching the version in pyproject.toml.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
